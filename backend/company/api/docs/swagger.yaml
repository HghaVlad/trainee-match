            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get profile by id
      tags:
      - company
    patch:
      consumes:
      - application/json
      description: Partially updates company fields, if field not provided or null
        - it won't be changed
      parameters:
      - description: Company ID
        in: path
        name: id
        required: true
        type: string
      - description: Request to update company
        in: body
        name: company_request
        required: true
        schema:
          $ref: '#/definitions/dto.CompanyUpdateRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
