info:
  contact: {}
  description: company microservice
  title: 'Trainee Match: Company Service API'
  version: "1.0"
paths:
  /companies:
    get:
      consumes:
      - application/json
      description: Uses cursor pagination, returns next cursor if there's more. Supports
        order by vacancies_desc, created_at_desc, name_asc
      parameters:
      - default: vacancies_desc
        description: Order attribute
        in: query
        name: order
        type: string
      - description: Items per page
        in: query
        name: cursor
        type: string
      - default: 20
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CompanyListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: List company summaries
      tags:
      - company
    post:
      consumes:
      - application/json
      description: Creates new company, returns id
      parameters:
      - description: Request to create a company
        in: body
        name: company_request
        required: true
        schema:
          $ref: '#/definitions/dto.CompanyCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CompanyCreatedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Create new company
      tags:
      - company
  /companies/{company-id}/vacancies:
    get:
      consumes:
      - application/json
      description: Uses cursor pagination, returns next cursor if there's more. Supports
        filters and status.
      parameters:
      - description: Company ID (UUID)
        in: path
        name: company-id
        required: true
        type: string
      - default: created_at_desc
        description: Order attribute
        in: query
        name: order
        type: string
      - description: Cursor
        in: query
        name: cursor
        type: string
      - default: 20
        description: Items per page
        in: query
        name: limit
        type: integer
      - description: Vacancy status filter
        in: query
        name: status
        type: string
      - description: Minimum salary
        in: query
        name: salary_min
        type: integer
      - description: Maximum salary
        in: query
        name: salary_max
        type: integer
      - description: Minimum hours per week
        in: query
        name: hours_min
        type: integer
      - description: Maximum hours per week
        in: query
        name: hours_max
        type: integer
      - description: Minimum duration in days
        in: query
        name: duration_min
        type: integer
      - description: Maximum duration in days
        in: query
        name: duration_max
        type: integer
      - description: Paid vacancy filter
        in: query
        name: is_paid
        type: boolean
      - description: Internship with possible job offer
        in: query
        name: internship_to_offer
        type: boolean
      - description: Flexible schedule filter
        in: query
        name: flexible_schedule
        type: boolean
      - collectionFormat: multi
        description: Work format filter (repeat param)
        in: query
        items:
          type: string
        name: work_format
        type: array
      - collectionFormat: multi
        description: City filter (repeat param)
        in: query
        items:
          type: string
        name: city
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.VacancyByCompListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Lists company's vacancy summaries
      tags:
      - vacancy
    post:
      consumes:
      - application/json
      description: Creates new vacancy, returns id
      parameters:
      - description: Company ID (UUID)
        in: path
        name: company-id
        required: true
        type: string
      - description: Request to create vacancy
        in: body
        name: vacancy_request
        required: true
        schema:
          $ref: '#/definitions/dto.VacancyCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.VacancyCreatedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Create new vacancy
      tags:
      - vacancy
  /companies/{company-id}/vacancies/{vacancy-id}:
    delete:
      description: Deletes vacancy by id
      parameters:
      - description: Vacancy ID
        in: path
        name: vacancy-id
        required: true
        type: string
      - description: Company ID
        in: path
        name: company-id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Delete vacancy
      tags:
      - vacancy
    get:
      consumes:
      - application/json
      description: Returns vacancy by id, company id should be correct, otherwise
        it's 404
      parameters:
      - description: Company ID (UUID)
        in: path
        name: company-id
        required: true
        type: string
      - description: Vacancy ID (UUID)
        in: path
        name: vacancy-id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.VacancyFullResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get vacancy by id
      tags:
      - vacancy
    patch:
      consumes:
      - application/json
      description: Partially updates vacancy fields. Nil fields are ignored (not updated).
      parameters:
      - description: Company ID
        in: path
        name: company-id
        required: true
        type: string
      - description: Vacancy ID
        in: path
        name: vacancy-id
        required: true
        type: string
      - description: Vacancy update payload
        in: body
        name: vacancy_request
        required: true
        schema:
          $ref: '#/definitions/dto.VacancyUpdateRequest'
      produces:
      - application/json
      responses:
        "204":
          description: Vacancy updated successfully
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Update vacancy
      tags:
      - vacancy
  /companies/{company-id}/vacancies/{vacancy-id}/archive:
    post:
      consumes:
      - application/json
      description: Archive vacancy (deactivation for candidates)
      parameters:
      - description: Company ID
        in: path
        name: company-id
        required: true
        type: string
      - description: Vacancy ID
        in: path
        name: vacancy-id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Vacancy archived successfully
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Archive vacancy (deactivation for candidates)
      tags:
      - vacancy
  /companies/{company-id}/vacancies/{vacancy-id}/publish:
    post:
      consumes:
      - application/json
      description: Publish vacancy for candidates
      parameters:
      - description: Company ID
        in: path
        name: company-id
        required: true
        type: string
      - description: Vacancy ID
        in: path
        name: vacancy-id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Vacancy published successfully
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Publish vacancy
      tags:
      - vacancy
  /companies/{id}:
    delete:
      description: Deletes company by id
      parameters:
      - description: Company ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
