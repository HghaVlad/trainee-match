services:
  company-db:
    image: postgres:17
    env_file:
      - company/.env
    ports:
      - "5432:5432"
    volumes:
      - company-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dima_terekhov -d company_db" ]
      interval: 20s
      timeout: 5s
      retries: 15
      start_period: 10s

  company-db-migrate:
    image: migrate/migrate
    volumes:
      - ./company/internal/infrastructure/db/postgres/migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://dima_terekhov:lowkey_tough@company-db:5432/company_db?sslmode=disable",
      "up"
    ]
    depends_on:
      company-db:
        condition: service_healthy

  redis-cache:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server # --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  company-service:
    build:
      context: ./company
    env_file:
      - company/.env
    ports:
      - "8088:8080"
    depends_on:
      company-db:
        condition: service_healthy
      company-db-migrate:
        condition: service_completed_successfully
      redis-cache:
        condition: service_healthy

volumes:
  company-db-data:
  redis_data: