services:
  keycloak-postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTP_MANAGEMENT_PORT: 9000

      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      keycloak-postgres:
        condition: service_healthy

    volumes:
      - ./auth/import:/opt/keycloak/data/import

  auth-service:
    build:
      context: auth
    environment:
      KC_URL: http://keycloak:8080
      KC_REALM: trainee-match
      KC_CLIENT_ID: auth_backend
      KC_CLIENT_SECRET: UAaVKlGqGXZs2LXZPiV3uFYCblmrEhJ8
      KC_ADMIN_USERNAME: admin
      KC_ADMIN_PASSWORD: admin
    ports:
      - "8000:8000"

  candidate-db:
    image: postgres:17
    ports:
      - "5432:5432"
    volumes:
      - candidate-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: candidate_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d candidate_db" ]
      interval: 20s
      timeout: 5s
      retries: 15
      start_period: 10s

  candidate-service:
    build:
      context: candidate
    environment:
      DB_HOST: candidate-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: candidate_db
      ADDR: 0.0.0.0:8081
      JWKURL: http://keycloak:8080/realms/trainee-match/protocol/openid-connect/certs

    ports:
      - "8081:8081"
    depends_on:
      - candidate-db
      - auth-service

  company-postgres:
    image: postgres:17
    env_file:
      - company/.env
    ports:
      - "5433:5432"
    volumes:
      - company-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${COMPANY_PGS_USER} -d ${COMPANY_PGS_NAME}" ]
      interval: 20s
      timeout: 5s
      retries: 15
      start_period: 10s

  company-postgres-migrate:
    image: migrate/migrate
    volumes:
      - ./company/internal/infrastructure/db/postgres/migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://${COMPANY_PGS_USER}:${COMPANY_PGS_PASS}@company-postgres:5432/${COMPANY_PGS_NAME}?sslmode=disable",
      "up"
    ]
    depends_on:
      company-postgres:
        condition: service_healthy

  redis-cache:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  company-service:
    build:
      context: ./company
    env_file:
      - company/.env
    ports:
      - "8088:8080"
    depends_on:
      company-postgres:
        condition: service_healthy
      company-postgres-migrate:
        condition: service_completed_successfully
      redis-cache:
        condition: service_healthy

volumes:
  keycloak-db-data:
  candidate-db-data:
  company-pg-data:
  redis_data: