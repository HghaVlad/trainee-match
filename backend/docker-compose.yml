services:
  keycloak-postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    healthcheck:
      test: pg_isready -d postgres
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak

      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      keycloak-postgres:
        condition: service_healthy

    volumes:
      - ./auth/import:/opt/keycloak/data/import

  auth-service:
    build:
      context: auth
    environment:
      KC_URL: http://keycloak:8080
    ports:
      - "8000:8000"

  candidate-db:
    image: postgres:17
    ports:
      - "5432:5432"
    volumes:
      - candidate-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: candidate_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d candidate_db" ]
      interval: 20s
      timeout: 5s
      retries: 15
      start_period: 10s

  candidate-service:
    build:
      context: candidate
    environment:
      DB_HOST: candidate-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: candidate_db
      ADDR: 0.0.0.0:8081
      JWKURL: http://keycloak:8080/realms/trainee-match/protocol/openid-connect/certs

    ports:
      - "8081:8081"
    depends_on:
      - candidate-db
      - auth-service

volumes:
  keycloak-db-data:
  candidate-db-data: